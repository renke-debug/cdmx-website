<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CDMX / Contact</title>
  <meta name="description" content="If this resonates, write.">
  <meta name="theme-color" content="#F8F6F1">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preload" as="font" type="font/woff2" href="/assets/fonts/HankenGrotesk-Variable.woff2" crossorigin>
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/css/base.css">
  <style>
    body[data-page="contact"] {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: var(--space-6);
    }
    .contact-block { text-align: center; max-width: 32rem; position: relative; z-index: 2; }
    .contact-line { font-size: clamp(var(--type-lg), 4vw, var(--type-2xl)); line-height: var(--lh-snug); font-style: italic; font-weight: 400; }
    .contact-addr { display: inline-block; margin-top: var(--space-8); font-family: var(--font-mono); font-size: var(--type-md); border-bottom: 2px solid var(--emphasis); padding: var(--space-2) var(--space-4); transition: background var(--dur-fast) var(--ease-snap); }
    .contact-addr:hover { background: var(--emphasis); }
    .substrate-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.5; }
  </style>
</head>
<body data-page="contact">
  <a href="#main" class="skip-link">Skip to content</a>
  <canvas id="substrate" class="substrate-canvas" aria-hidden="true"></canvas>
  <main id="main">
    <div class="contact-block">
      <p class="contact-line">If this resonates, write.</p>
      <a class="contact-addr" href="mailto:renke@cdmx.be">renke@cdmx.be</a>
    </div>
  </main>
  <aside class="site-chrome"><span>CDMX / </span><span class="route">CONTACT</span></aside>
  <script type="module" src="/assets/js/main.js"></script>
</body>
</html>
