<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>404 · CDMX</title>
<meta name="robots" content="noindex" />
<link rel="icon" type="image/png" href="favicon.png" />
<style>
@font-face {
  font-family: "Hanken Grotesk";
  src: url("assets/fonts/HankenGrotesk-Variable.woff2") format("woff2-variations");
  font-weight: 100 900;
  font-display: swap;
}
:root {
  --peach:  #FFBA94;
  --green:  #C7E3BA;
  --cyan:   #D9F7F5;
  --yellow: #FFE57D;
  --ink:    #101010;
  --paper:  #FDFDFB;
  --mint-a: #EDF7EA;
  --mint-b: #CBEBD4;
  /* krijtjes: de vier pastellen, maar aangezet zoals in de tattoo */
  --k-geel:   #F2B531;
  --k-groen:  #55A860;
  --k-blauw:  #3FA8C9;
  --k-oranje: #EF8A4E;
  --k-roze:   #E2547A;
  --gutter: clamp(1.25rem, 5vw, 5rem);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: "Hanken Grotesk", "Helvetica Neue", sans-serif;
  color: var(--ink);
  background: linear-gradient(150deg, var(--mint-a) 0%, var(--mint-b) 100%);
  display: flex; flex-direction: column;
  min-height: 100svh;
  padding: 1.1rem var(--gutter) 2rem;
  overflow-x: clip;
}
a { color: inherit; }

.nav { display: flex; align-items: center; justify-content: space-between; }
.nav img { height: 20px; width: auto; display: block; }
.nav a { text-decoration: none; }
.nav-back {
  font-size: 0.72rem; font-weight: 800; letter-spacing: 0.18em;
  text-transform: uppercase;
  border-bottom: 2px solid var(--ink); padding-bottom: 2px;
}

.wrap {
  flex: 1;
  display: grid;
  place-items: center;
  position: relative;
}
.card { position: relative; text-align: center; max-width: 34rem; z-index: 2; }

.label {
  font-size: 0.82rem; letter-spacing: 0.2em; text-transform: uppercase;
  font-weight: 300;
}
.label b { font-weight: 800; }

.big {
  margin-top: 0.6rem;
  font-size: clamp(5rem, 18vw, 11rem);
  line-height: 1; font-weight: 900; letter-spacing: -0.02em;
  display: flex; align-items: center; justify-content: center;
  gap: 0.06em;
}
.big svg { width: 0.9em; height: 0.9em; overflow: visible; }

.sub {
  margin-top: 1.4rem;
  font-size: clamp(1rem, 1.4vw, 1.2rem);
  line-height: 1.65;
}
.cta {
  display: inline-block; margin-top: 1.8rem;
  padding: 1rem 1.7rem;
  background: var(--ink); color: var(--paper);
  text-decoration: none; font-weight: 800;
  font-size: clamp(0.95rem, 1.3vw, 1.1rem); letter-spacing: 0.03em;
  transition: box-shadow 0.3s;
}
.cta:hover { box-shadow: 6px 6px 0 rgba(16, 16, 16, 0.4); }

.signoff {
  margin-top: 2.2rem;
  font-size: 0.86rem; font-weight: 800; letter-spacing: 0.06em;
  font-style: italic;
}

/* ---------- de kindertekening ---------- */
.doodle {
  position: absolute; z-index: 1;
  pointer-events: none; user-select: none;
  overflow: visible;
  animation: floaty 6s ease-in-out infinite alternate;
  animation-delay: var(--fd, 0s);
}
.doodle path, .doodle circle, .doodle line {
  fill: none; stroke-width: 5;
  stroke-linecap: round; stroke-linejoin: round;
}
@keyframes floaty {
  from { transform: translateY(-7px) rotate(-1deg); }
  to { transform: translateY(7px) rotate(1.5deg); }
}
@media (prefers-reduced-motion: reduce) { .doodle { animation: none; } }

.d-palm  { left: 4%;  bottom: 8%;  width: clamp(70px, 12vw, 150px); }
.d-golf  { left: 12%; top: 16%;    width: clamp(70px, 11vw, 140px); }
.d-surf  { right: 6%; bottom: 12%; width: clamp(56px, 9vw, 110px); }
.d-koffie{ right: 12%; top: 14%;   width: clamp(40px, 6vw, 70px); }
.d-vogel { left: 22%; bottom: 26%; width: clamp(56px, 8vw, 96px); }
.d-vlag  { right: 20%; top: 34%;   width: clamp(70px, 10vw, 130px); }

@media (max-width: 700px) {
  .d-golf { top: 10%; }
  .d-vlag { display: none; }
  .d-vogel { left: 8%; bottom: 18%; }
}
</style>
</head>
<body>

<nav class="nav">
